name: Deploy

on:
  push:
    branches:
      - main

jobs:
  
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      
      - name: Downcase repository name
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      
      # - name: Build and push Frontend Image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./frontend
      #     push: true
      #     tags: ghcr.io/${{ env.REPO_NAME }}/frontend:latest

      
      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.REPO_NAME }}/frontend:latest
          
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ secrets.SERVER_IP }}:8000/api
            NEXT_PUBLIC_WS_URL=ws://${{ secrets.SERVER_IP }}:8000/api


  
  deploy:
    needs: build-frontend 
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            cd ~/nonograms
            git fetch origin main
            git reset --hard origin/main
            
            # Автоматично підставляємо назву вашого репозиторію в нижньому регістрі на сервері
            export REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            
            # Запис backend .env
            cat > backend/.env << EOF
            DB_USER=appuser
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=nonograms
            DATABASE_URL=mysql+aiomysql://appuser:${{ secrets.DB_PASSWORD }}@db:3306/nonograms
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ALGORITHM=HS256
            EOF
            
            # Запис кореневого .env для усунення попереджень WARN в docker compose
            cat > .env << EOF
            DB_USER=appuser
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=nonograms
            REPO_NAME=${REPO_NAME}
            EOF
            
            # Запис frontend .env.local
            cat > frontend/.env.local << EOF
            NEXT_PUBLIC_API_URL=http://${{ secrets.SERVER_IP }}:8000/api
            NEXT_PUBLIC_WS_URL=ws://${{ secrets.SERVER_IP }}:8000/api
            EOF

            # Авторизуємо ваш сервер в реєстрі GitHub, щоб він міг стягнути образ
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Стягуємо готовий образ фронтенду з GitHub, а Backend збираємо локально (він легкий)
            docker compose pull frontend
            docker compose build backend --no-cache
            
            # Запускаємо оновлений стек
            docker compose up -d --force-recreate
            
            # Повне очищення диска від старого сміття
            docker image prune -f
            docker builder prune -f --all
